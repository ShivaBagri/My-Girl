<!DOCTYPE html>
<html>
<head>
  <title>Wanna see my sister? 😊</title>
  <style>
    body { 
      text-align: center; 
      font-family: Arial; 
      margin-top: 50px; 
      background-color: #f9f9f9;
    }
    button { 
      padding: 12px 25px; 
      font-size: 18px; 
      border: none;
      border-radius: 8px;
      background-color: #ff4d6d;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #e63950;
    }
    video { 
      margin-top: 20px; 
      width: 300px; 
      border-radius: 12px; 
    }
  </style>
</head>
<body>

<h2>Wanna see my sister? 😄</h2>
<p>Tap below and don’t be shy…</p>

<button onclick="startCamera()">Show me 👀</button>

<video id="video" autoplay playsinline></video>

<script>
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      document.getElementById('video').srcObject = stream;
    })
    .catch(() => {
      alert("You gotta allow the camera 😉");
    });
}
</script>

</body>
</html>
