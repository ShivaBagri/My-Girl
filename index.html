<!DOCTYPE html>
<html>
<head>
  <title>Wanna see my girl? 💕</title>
  <style>
    body { text-align: center; font-family: Arial; margin-top: 50px; }
    button { padding: 10px 20px; font-size: 18px; }
    video { margin-top: 20px; width: 300px; border-radius: 10px; }
  </style>
</head>
<body>

<h2>Wanna see my girl? 😏</h2>
<p>Tap below and don’t be shy…</p>

<button onclick="startCamera()">Show me 👀</button>

<video id="video" autoplay playsinline></video>

<script>
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      document.getElementById('video').srcObject = stream;
    })
    .catch(() => {
      alert("You gotta allow the camera 😉");
    });
}
</script>

</body>
</html>
